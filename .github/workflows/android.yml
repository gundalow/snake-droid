name: Android Build and Release

on:
  push:
    branches:
      - main # Trigger on pushes to the main branch

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Static Analysis (ktlint)
        run: ./gradlew ktlintCheck

      - name: Run Static Analysis (detekt)
        run: ./gradlew detekt

      - name: Run Unit Tests
        run: ./gradlew test

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          generate_release_notes: true
          files: app/build/outputs/apk/release/app-release.apk

      - name: Prepare Netlify Deployment
        run: |
          mkdir deploy
          cp app/build/outputs/apk/release/app-release.apk deploy/snake-game.apk
          echo '<html><body><h1>Snake Game</h1><a href="snake-game.apk">Download APK</a></body></html>' > deploy/index.html

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './deploy'
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy APK to Netlify"
          enable-pull-request-comment: false
          enable-commit-comment: true
          overriding-debug-mode: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
