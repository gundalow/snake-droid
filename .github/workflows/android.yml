name: Android Build and Release

on:
  push:
    branches:
      - main # Trigger on pushes to the main branch
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Static Analysis (ktlint)
        run: ./gradlew ktlintCheck

      - name: Run Static Analysis (detekt)
        run: ./gradlew detekt

      - name: Run Unit Tests
        run: ./gradlew test

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          generate_release_notes: true
          files: app/build/outputs/apk/release/app-release.apk

      - name: Verify and Prepare Deployment
        run: |
          # Verify the APK exists and is valid
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "Error: APK not found at $APK_PATH"
            exit 1
          fi

          # Basic ZIP integrity check
          unzip -t "$APK_PATH"

          # Prepare the deployment directory
          mkdir -p deploy
          cp "$APK_PATH" deploy/snake-game.apk
          echo '<html><body><h1>Snake Game</h1><p>Latest Build</p><a href="snake-game.apk">Download APK</a></body></html>' > deploy/index.html

          # List the files to confirm
          ls -R deploy/

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './deploy'
          production-deploy: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy APK to Netlify"
          enable-pull-request-comment: true
          enable-commit-comment: true
          overriding-debug-mode: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
